name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changeset-intent:
    if: github.event_name == 'pull_request'
    name: changeset-intent
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false

      - name: Validate semver intent
        env:
          CHANGESET_BASE_REF: origin/${{ github.base_ref }}
        run: npm run changeset:check

  repo-checks:
    name: ${{ matrix.check.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        check:
          - name: lint
            command: npm run lint:ci
          - name: type-check
            command: npm run type-check
          - name: docs-drift
            command: npm run docs-drift:check
          - name: unit-test
            command: npm run test
          - name: build
            command: npm run build
          - name: pack-smoke
            command: npm run test:pack

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run ${{ matrix.check.name }}
        run: ${{ matrix.check.command }}
